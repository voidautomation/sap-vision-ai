<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Vision AI - Spotlight</title>    
    <!-- <link rel="icon" type="image/png" href="my-logo.png"> -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Minimalist Spotlight Base */
        body { background-color: #fafbfc; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Layout Transitions */
        #topSpacer { flex-grow: 1; transition: flex-grow 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .state-active #topSpacer { flex-grow: 0; height: 0; }
        
        #chatContainer { flex-grow: 0; opacity: 0; overflow-y: auto; padding: 20px; transition: opacity 0.5s ease 0.3s, flex-grow 0.6s cubic-bezier(0.25, 1, 0.5, 1); display: none; }
        .state-active #chatContainer { display: flex; flex-direction: column; flex-grow: 1; opacity: 1; }

        /* The Spotlight Input Bar */
        #spotlightWrapper { flex-shrink: 0; padding: 20px; width: 100%; max-width: 800px; margin: 0 auto; transition: transform 0.6s ease; z-index: 10; }
        .spotlight-bar { background: #fff; border: none; border-radius: 24px; box-shadow: 0 8px 24px rgba(149, 157, 165, 0.15); display: flex; flex-direction: column; overflow: hidden; transition: box-shadow 0.2s; }
        .spotlight-bar:focus-within { box-shadow: 0 12px 32px rgba(149, 157, 165, 0.25); outline: none; }
        
        textarea { font-family: 'Inter', sans-serif; border: none !important; box-shadow: none !important; resize: none; padding: 20px 24px; font-size: 1.15rem; color: #202124; background: transparent; outline: none; }
        textarea::placeholder { color: #9aa0a6; font-weight: 400; }
        
        .spotlight-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px 15px; }
        
        /* Minimalist Chat Bubbles */
        .chat-bubble { padding: 24px; border-radius: 16px; margin-bottom: 24px; max-width: 90%; }
        .bubble-user { background: #f1f3f4; color: #202124; margin-left: auto; border-bottom-right-radius: 4px; font-weight: 500; font-size: 16px; border: 1px solid #dadce0; width: fit-content; line-height: 1.6; }
        .bubble-ai { background: transparent; border-bottom-left-radius: 4px; padding-left: 0; }
        
        /* --- PREMIUM AI MARKDOWN TYPOGRAPHY --- */
        .markdown-body { font-size: 16px; color: #202124; line-height: 1.7; }
        .markdown-body h1 { font-size: 1.5rem; font-weight: 600; color: #202124; margin-top: 1rem; border-bottom: 1px solid #dadce0; padding-bottom: 0.5rem; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 600; color: #1a73e8; margin-top: 1.75rem; margin-bottom: 0.75rem; letter-spacing: 0; text-transform: none; }
        .markdown-body p, .markdown-body li { color: #3c4043; margin-bottom: 1rem; }
        .markdown-body strong { color: #202124; font-weight: 600; }
        .markdown-body code { background: #f1f3f4; padding: 0.2em 0.4em; border-radius: 6px; font-size: 14px; color: #d93025; font-family: 'Courier New', Courier, monospace; }
        .markdown-body pre { background: #202124; color: #f8f9fa; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 14px; }
        .markdown-body pre code { color: inherit; background: transparent; padding: 0; }
        .user-uploaded-img { max-width: 100%; border-radius: 8px; margin-top: 16px; border: 1px solid #dadce0; max-height: 400px; object-fit: contain; background: #fff; }

        /* Tools Header (Fades in) */
        #toolsHeader { opacity: 0; transition: opacity 0.5s ease; display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(250, 251, 252, 0.9); backdrop-filter: blur(5px); border-bottom: 1px solid #dadce0; position: sticky; top: 0; z-index: 5; }
        .state-active #toolsHeader { opacity: 1; }

        /* Image Attachment Pill */
        .image-pill { display: none; align-items: center; gap: 8px; background: #e8f0fe; color: #1a73e8; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: 500; margin: 0 20px 10px; border: 1px solid #d2e3fc; width: fit-content; }
        .image-pill img { height: 24px; width: 24px; object-fit: cover; border-radius: 4px; }

        /* Dynamic Loading Text */
        .loading-status-area { display: flex; align-items: center; gap: 12px; padding: 0 20px 10px; color: #1a73e8; font-weight: 500; font-size: 14px; }
        .pulse-text { animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body id="appBody">

    <div id="toolsHeader">
        <h5 id="dynamicHeaderTitle" class="mb-0 fw-bold text-dark tracking-tight">
            <div id="toolsHeader">
        <h5 id="dynamicHeaderTitle" class="mb-0 fw-bold text-dark tracking-tight d-flex align-items-center">
            <img src="my-logo.png" alt="Logo" style="height: 28px; width: 28px; margin-right: 10px; border-radius: 4px; object-fit: contain;">
            SAP Vision AI
        </h5>
        <button id="pdfBtn" class="btn btn-sm btn-outline-secondary rounded-pill px-3"><i class="bi bi-file-earmark-pdf me-1"></i>Export PDF</button>
    </div>
        <button id="pdfBtn" class="btn btn-sm btn-outline-secondary rounded-pill px-3"><i class="bi bi-file-earmark-pdf me-1"></i>Export PDF</button>
    </div>

    <div id="topSpacer"></div>

    <div id="chatContainer">
        <div id="chatBox" class="w-100 mx-auto" style="max-width: 800px;">
            </div>
    </div>

    <div id="spotlightWrapper">
        
        <div id="welcomeText" class="text-center mb-4 transition-opacity">
            <!-- <i class="bi bi-robot fs-1 text-primary opacity-75"></i> -->
            <img src="my-logo.png" alt="Logo" style="height: 160px; width: 160px; margin-top: 15px; border-radius: 8px; object-fit: contain;">
            <h2 class="fw-bold mt-2" style="color: #202124;">How can I help you resolve this?</h2>
            <p class="text-muted">Describe the SAP error, attach a dump, or drop a screenshot.</p>
        </div>

        <div class="spotlight-bar">
            <textarea id="mainInput" rows="2" placeholder="Ask anything... (Shift+Enter for new line)" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
            
            <div id="imagePill" class="image-pill">
                <img id="imagePreview" src="">
                <span>Screenshot Attached</span>
                <i class="bi bi-x-circle-fill text-danger ms-2" style="cursor: pointer;" id="removeImgBtn"></i>
            </div>

            <div id="loadingStatusArea" class="loading-status-area d-none">
                <div class="spinner-border spinner-border-sm" role="status"></div>
                <span id="loadingDynamicText" class="pulse-text">Analyzing the error...</span>
            </div>

            <div class="spotlight-toolbar">
                <div>
                    <input type="file" id="fileInput" class="d-none" accept="image/*">
                    <button class="btn btn-light btn-sm text-secondary rounded-circle" style="width:36px; height:36px;" onclick="document.getElementById('fileInput').click()" title="Attach Image">
                        <i class="bi bi-paperclip fs-5"></i>
                    </button>
                </div>
                
                <div class="d-flex align-items-center gap-3">
                    <button id="sendBtn" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">Analyze</button>
                </div>
            </div>
        </div>
    </div>

    <div style="height: 4vh; flex-shrink: 0;"></div>

    <script>
        // State
        let base64Image = null;
        let fullMarkdownLog = "";
        let currentDynamicTitle = "SAP Resolution Report"; 
        let loadingInterval;

        // UI Elements
        const appBody = document.getElementById('appBody');
        const welcomeText = document.getElementById('welcomeText');
        const mainInput = document.getElementById('mainInput');
        const chatBox = document.getElementById('chatBox');
        const chatContainer = document.getElementById('chatContainer');
        const fileInput = document.getElementById('fileInput');
        const imagePill = document.getElementById('imagePill');
        const imagePreview = document.getElementById('imagePreview');
        const sendBtn = document.getElementById('sendBtn');
        const loadingStatusArea = document.getElementById('loadingStatusArea');
        const loadingDynamicText = document.getElementById('loadingDynamicText');
        const dynamicHeaderTitle = document.getElementById('dynamicHeaderTitle');

        const processingSteps = [
            "Analyzing the error...",
            "Cross-checking with SAP KBAs...",
            "Cross-checking SAP notes...",
            "Formulating resolution strategy...",
            "Generating step-by-step solution..."
        ];

        // Image Handling
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    base64Image = ev.target.result;
                    imagePreview.src = base64Image;
                    imagePill.style.display = 'flex';
                };
                reader.readAsDataURL(file);
            }
        });
        document.getElementById('removeImgBtn').addEventListener('click', () => {
            base64Image = null; fileInput.value = ""; imagePill.style.display = 'none';
        });

        // Submit via Enter Key
        mainInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendBtn.click();
            }
        });

        // Chat Bubble Generator
        function addBubble(role, content) {
            const div = document.createElement('div');
            div.className = `chat-bubble ${role === 'user' ? 'bubble-user' : 'bubble-ai markdown-body'}`;
            
            if (role === 'user') {
                div.innerHTML = content;
            } else {
                div.innerHTML = marked.parse(content);
            }
            chatBox.appendChild(div);
            setTimeout(() => chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' }), 50);
        }

        // Core AI Call (One-Shot)
        sendBtn.addEventListener('click', async () => {
            const text = mainInput.value.trim();
            if (!text && !base64Image) return;

            // Trigger Spotlight Transition
            appBody.classList.add('state-active');
            welcomeText.style.display = 'none';
            chatBox.innerHTML = ''; 
            
            // Prepare UI & Loading
            mainInput.value = '';
            mainInput.style.height = 'auto';
            sendBtn.disabled = true;
            dynamicHeaderTitle.innerHTML = `<i class="bi bi-cpu me-2 text-primary"></i>SAP Vision AI`; 
            
            loadingStatusArea.classList.remove('d-none');
            let stepIndex = 0;
            loadingDynamicText.innerText = processingSteps[0];
            loadingInterval = setInterval(() => {
                stepIndex = (stepIndex + 1) % processingSteps.length;
                loadingDynamicText.innerText = processingSteps[stepIndex];
            }, 2500);

            // Construct the User Bubble
            let userPromptHTML = text ? text.replace(/\n/g, '<br>') : '';
            if (base64Image) {
                userPromptHTML += `<br><img src="${base64Image}" class="user-uploaded-img" />`;
            }
            
            addBubble('user', userPromptHTML);
            
            // Log for PDF
            let pdfPromptLog = text || "*[Image Only Request]*";
            if (base64Image) pdfPromptLog += `\n\n<img src="${base64Image}" class="uploaded-img" />`;
            fullMarkdownLog = `**User Query:**\n${pdfPromptLog}\n\n---\n\n`;

            imagePill.style.display = 'none';
            const imageToSend = base64Image; 
            base64Image = null; 
            fileInput.value = "";

            try {
                const response = await fetch('/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, image: imageToSend })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                // Extract Title
                const titleMatch = data.solution.match(/^#\s+(.*)/m);
                if (titleMatch && titleMatch[1]) {
                    currentDynamicTitle = titleMatch[1].trim();
                    dynamicHeaderTitle.innerHTML = `<i class="bi bi-shield-check me-2 text-success"></i>${currentDynamicTitle}`;
                } else {
                    currentDynamicTitle = "SAP Resolution Report";
                }

                fullMarkdownLog += data.solution;
                addBubble('model', data.solution);
                mainInput.placeholder = "Start a new query...";

            } catch (error) {
                addBubble('model', `**Error:** ${error.message}`);
            } finally {
                clearInterval(loadingInterval);
                loadingStatusArea.classList.add('d-none');
                sendBtn.disabled = false;
                mainInput.focus();
            }
        });

        // PDF Generation
        document.getElementById('pdfBtn').addEventListener('click', async () => {
            const btn = document.getElementById('pdfBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Exporting...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/generate-pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        markdownData: fullMarkdownLog,
                        title: currentDynamicTitle 
                    })
                });
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                
                const safeFileName = currentDynamicTitle.replace(/[^a-zA-Z0-9]/g, '_');
                a.href = url;
                a.download = `${safeFileName}.pdf`;
                
                a.click();
                a.remove();
            } catch (e) {
                alert("Failed to export PDF.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
